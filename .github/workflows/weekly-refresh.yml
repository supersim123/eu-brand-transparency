name: weekly-refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 6"

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate data
        run: python scripts/validate_data.py
      - name: Regenerate public list
        run: python scripts/generate_readme.py
      - name: Create update pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: update/weekly-refresh
          delete-branch: true
          commit-message: "Update EU Brand Transparency list"
          title: "Weekly EU Brand Transparency update"
          body-path: latest-changes.md
          labels: automated, weekly-refresh
