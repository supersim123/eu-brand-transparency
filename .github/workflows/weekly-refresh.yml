name: weekly-refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 6"

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate data
        run: python scripts/validate_data.py
      - name: Regenerate public list
        run: python scripts/generate_readme.py
      - name: Run OpenAI news research
        if: github.event_name == 'schedule' || github.actor == 'supersim123'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.5' }}
          OPENAI_TIMEOUT_SECONDS: "900"
          OPENAI_REASONING_EFFORT: low
        run: python scripts/openai_news_research.py
      - name: Audit generated README
        if: github.event_name == 'schedule' || github.actor == 'supersim123'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.5' }}
          OPENAI_AUDIT_MODEL: ${{ vars.OPENAI_AUDIT_MODEL || vars.OPENAI_MODEL || 'gpt-5.5' }}
          OPENAI_TIMEOUT_SECONDS: "900"
          OPENAI_REASONING_EFFORT: low
        run: python scripts/audit_readme.py --fail-on-stop
      - name: Run tests
        run: python -m unittest discover -s tests
      - name: Create update pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: update/weekly-refresh
          delete-branch: true
          commit-message: "Update EU Brand Transparency list"
          title: "Weekly EU Brand Transparency update"
          body-path: latest-changes.md
          labels: automated, weekly-refresh
